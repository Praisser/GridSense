services:
  timescaledb:
    build:
      context: .
      dockerfile: docker/timescaledb/Dockerfile
    image: gridsense-timescaledb-postgis:pg15
    container_name: gridsense-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gridsense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gridsense}
      POSTGRES_DB: ${POSTGRES_DB:-gridsense}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/timescale_data:/home/postgres/pgdata/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-gridsense} -d ${POSTGRES_DB:-gridsense}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
